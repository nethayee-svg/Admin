<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSP SUPREME | Professional Admin Panel</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --primary: #0061ff; --secondary: #60a5fa; --dark: #0f172a; --light-bg: #f8fafc; }
        body { font-family: 'Prompt', sans-serif; background-color: var(--light-bg); color: var(--dark); overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Login Overlay */
        #login-overlay { position: fixed; inset: 0; z-index: 9999; background: #0f172a; display: flex; align-items: center; justify-content: center; }

        /* Sidebar & Layout */
        .sidebar { transition: all 0.3s; background: white; border-right: 1px solid #e2e8f0; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 14px 20px; margin: 4px 12px; border-radius: 14px; color: #64748b; font-weight: 500; transition: 0.2s; cursor: pointer; }
        .nav-link:hover { background: #f1f5f9; color: var(--primary); }
        .nav-link.active { background: var(--primary); color: white; box-shadow: 0 10px 15px -3px rgba(0, 97, 255, 0.25); }

        /* Premium Cards */
        .glass-card { background: white; border-radius: 24px; border: 1px solid rgba(226, 232, 240, 0.8); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02); }
        .stat-card-blue { background: linear-gradient(135deg, #0061ff 0%, #60a5fa 100%); color: white; }
        
        /* Table Style */
        .table-container { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .table-row { background: white; transition: 0.3s; }
        .table-td { padding: 18px 20px; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; }
        .table-td:first-child { border-left: 1px solid #f1f5f9; border-top-left-radius: 18px; border-bottom-left-radius: 18px; }
        .table-td:last-child { border-right: 1px solid #f1f5f9; border-top-right-radius: 18px; border-bottom-right-radius: 18px; }

        .status-badge { padding: 6px 14px; border-radius: 10px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen lg:flex">

    <div id="login-overlay">
        <div class="bg-white w-full max-w-md rounded-[32px] p-10 shadow-2xl">
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center text-white mx-auto mb-5 shadow-xl shadow-blue-200">
                    <i class="fas fa-user-shield text-3xl"></i>
                </div>
                <h2 class="text-2xl font-black text-slate-800">Admin Authentication</h2>
                <p class="text-slate-400 text-sm">ระบบจัดการหลังบ้าน RSP Supreme</p>
            </div>
            <div class="space-y-4">
                <input type="email" id="login-email" placeholder="Email Address" class="w-full p-4 bg-slate-50 border-none ring-1 ring-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="login-pass" placeholder="Password" class="w-full p-4 bg-slate-50 border-none ring-1 ring-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl hover:bg-blue-700 transition shadow-lg shadow-blue-200">เข้าสู่ระบบ</button>
            </div>
        </div>
    </div>

    <aside id="main-sidebar" class="sidebar fixed inset-y-0 left-0 z-50 w-72 transform -translate-x-full lg:translate-x-0 lg:static hidden">
        <div class="p-8 flex items-center gap-4">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-xl shadow-blue-200">
                <i class="fas fa-shield-halved text-2xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-extrabold tracking-tight">RSP <span class="text-blue-600">SUPREME</span></h1>
            </div>
        </div>
        <nav class="mt-4 flex-1">
            <div onclick="switchTab('dash')" class="nav-link active" id="btn-dash"><i class="fa-solid fa-house-chimney-window"></i> แผงควบคุม</div>
            <div onclick="switchTab('users')" class="nav-link" id="btn-users"><i class="fa-solid fa-users-gear"></i> จัดการสมาชิก</div>
            <div onclick="switchTab('wit')" class="nav-link relative" id="btn-wit">
                <i class="fa-solid fa-money-bill-transfer"></i> รายการธุรกรรม
                <span id="badge-wit-count" class="absolute right-4 top-1/2 -translate-y-1/2 bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full hidden">0</span>
            </div>
            <div onclick="switchTab('setting')" class="nav-link" id="btn-setting"><i class="fa-solid fa-gears"></i> ตั้งค่าระบบ</div>
        </nav>
        <div class="p-6 mt-auto">
            <button onclick="logout()" class="w-full flex items-center justify-center gap-2 bg-red-50 text-red-500 py-4 rounded-2xl font-bold text-sm hover:bg-red-500 hover:text-white transition-all">
                <i class="fa-solid fa-power-off"></i> ออกจากระบบ
            </button>
        </div>
    </aside>

    <main id="main-content" class="flex-1 overflow-y-auto h-screen p-4 lg:p-10 hidden">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h2 id="page-title" class="text-3xl font-black text-slate-800">แผงควบคุมหลัก</h2>
                <p id="page-desc" class="text-slate-400 text-sm">ยินดีต้อนรับแอดมิน, ตรวจสอบสถานะระบบได้ที่นี่</p>
            </div>
        </header>

        <section id="tab-dash" class="tab-content active">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                <div class="glass-card p-8 stat-card-blue"><h3 class="text-5xl font-black mb-1" id="stat-total-users">0</h3><p class="text-blue-100 text-xs font-bold uppercase">สมาชิกทั้งหมด</p></div>
                <div class="glass-card p-8"><h3 class="text-5xl font-black mb-1 text-slate-800">฿<span id="stat-total-bal">0.00</span></h3><p class="text-slate-400 text-xs font-bold uppercase">เครดิตรวมลูกค้า</p></div>
                <div class="glass-card p-8 border-l-8 border-l-orange-500"><h3 class="text-5xl font-black mb-1 text-orange-500" id="stat-pending-wit">0</h3><p class="text-slate-400 text-xs font-bold uppercase">รายการรอถอนเงิน</p></div>
            </div>
        </section>

        <section id="tab-users" class="tab-content">
            <div class="glass-card p-6 mb-8 flex items-center gap-4">
                <i class="fa-solid fa-magnifying-glass text-slate-400 ml-2"></i>
                <input type="text" id="user-search" oninput="renderUserTable()" placeholder="ค้นหาชื่อหรืออีเมลลูกค้า..." class="flex-1 bg-transparent border-none outline-none text-slate-600 font-medium">
            </div>
            <div class="overflow-x-auto">
                <table class="table-container">
                    <tbody id="user-table-body"></tbody>
                </table>
            </div>
        </section>

        <section id="tab-wit" class="tab-content">
            <div class="flex bg-white p-1.5 rounded-2xl shadow-sm border w-fit mb-8">
                <button onclick="switchWitSubTab('pending')" id="sub-pending-btn" class="px-8 py-3 rounded-xl text-xs font-bold transition-all bg-blue-600 text-white shadow-lg shadow-blue-100">รายการรออนุมัติ</button>
                <button onclick="switchWitSubTab('all')" id="sub-all-btn" class="px-8 py-3 rounded-xl text-xs font-bold transition-all text-slate-500">ประวัติถอนทั้งหมด</button>
            </div>
            <div class="overflow-x-auto">
                <table class="table-container">
                    <tbody id="transaction-table-body"></tbody>
                </table>
            </div>
        </section>

        <section id="tab-setting" class="tab-content">
            <div class="max-w-xl glass-card p-10">
                <h4 class="text-xl font-bold mb-6">ตั้งค่าการติดต่อซัพพอร์ต</h4>
                <div class="space-y-4">
                    <input type="text" id="config-support-url" placeholder="ลิงก์ LINE หรือ Telegram" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                    <button onclick="saveSystemSettings()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl hover:bg-blue-700 transition">บันทึกข้อมูลระบบ</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        // ✅ 1. CONFIG & AUTH
        const firebaseConfig = { apiKey: "AIzaSyDaeVJ1mUxjm1gG4GMTfZyqJsjImiISzPI", projectId: "gaga-1eb83" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(), auth = firebase.auth();

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('main-sidebar').classList.remove('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                initRealtimeData();
            } else {
                document.getElementById('login-overlay').classList.remove('hidden');
            }
        });

        async function handleLogin() {
            const e = document.getElementById('login-email').value, p = document.getElementById('login-pass').value;
            try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { Swal.fire('Login Failed', 'อีเมลหรือรหัสผ่านผิด', 'error'); }
        }

        // ✅ 2. DATA LOADERS
        let users = [], transactions = [], currentTab = 'dash', witSubTab = 'pending';

        function initRealtimeData() {
            db.collection('users').onSnapshot(snap => { users = snap.docs.map(d => ({ id: d.id, ...d.data() })); updateStats(); if(currentTab==='users') renderUserTable(); });
            db.collection('transactions').onSnapshot(snap => { 
                transactions = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.time || 0) - (a.time || 0)); 
                updateStats(); 
                if(currentTab==='wit') renderTransactionTable(); 
            });
            db.collection('settings').doc('contact').get().then(doc => { if(doc.exists) document.getElementById('config-support-url').value = doc.data().url || ''; });
        }

        function updateStats() {
            document.getElementById('stat-total-users').innerText = users.length;
            document.getElementById('stat-total-bal').innerText = users.reduce((s, u) => s + (u.balance || 0), 0).toLocaleString();
            const p = transactions.filter(t => t.status === 'pending').length;
            document.getElementById('stat-pending-wit').innerText = p;
            const b = document.getElementById('badge-wit-count');
            if(p > 0) { b.innerText = p; b.classList.remove('hidden'); } else { b.classList.add('hidden'); }
        }

        // ✅ 3. RENDER FUNCTIONS
        function renderUserTable() {
            const search = document.getElementById('user-search').value.toLowerCase();
            const filtered = users.filter(u => (u.name||"").toLowerCase().includes(search) || (u.email||"").toLowerCase().includes(search));
            let html = '';
            filtered.forEach(u => {
                html += `
                <tr class="table-row">
                    <td class="table-td font-bold text-slate-700">${u.name||'No Name'}<br><span class="text-[10px] text-slate-400">${u.email}</span></td>
                    <td class="table-td font-black text-blue-600 text-lg">฿${(u.balance||0).toLocaleString()}</td>
                    <td class="table-td"><span class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-lg text-xs font-bold">${u.winRate||35}% WR</span></td>
                    <td class="table-td text-right">
                        <div class="flex justify-end gap-2">
                            <button onclick="adjustCredit('${u.id}', 'add')" class="w-9 h-9 bg-green-50 text-green-600 rounded-xl hover:bg-green-600 hover:text-white transition"><i class="fa-solid fa-plus"></i></button>
                            <button onclick="adjustCredit('${u.id}', 'minus')" class="w-9 h-9 bg-red-50 text-red-500 rounded-xl hover:bg-red-500 hover:text-white transition"><i class="fa-solid fa-minus"></i></button>
                            <button onclick="editWinRate('${u.id}', ${u.winRate})" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-[10px] font-bold">SET WR</button>
                        </div>
                    </td>
                </tr>`;
            });
            document.getElementById('user-table-body').innerHTML = html;
        }

        function renderTransactionTable() {
            let filtered = witSubTab === 'pending' ? transactions.filter(t => t.status === 'pending') : transactions;
            let html = '';
            filtered.forEach(t => {
                const info = (t.details || "").split(" | ");
                html += `
                <tr class="table-row">
                    <td class="table-td font-bold text-slate-700">${t.name}</td>
                    <td class="table-td font-black text-slate-800">฿${(t.amt||0).toLocaleString()}</td>
                    <td class="table-td">
                        <button onclick="viewBankInfo('${info[0]}','${info[1]}','${info[2]}')" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl text-[11px] font-bold hover:bg-blue-600 hover:text-white transition">
                            <i class="fa-solid fa-id-card mr-1"></i> ดูบัญชี
                        </button>
                    </td>
                    <td class="table-td">
                        ${t.status === 'pending' ? `
                            <div class="flex gap-2">
                                <button onclick="approveTransaction('${t.id}')" class="bg-blue-600 text-white px-5 py-2 rounded-xl text-[10px] font-bold shadow-lg">ยืนยันโอน</button>
                                <button onclick="cancelWithdraw('${t.id}', '${t.uid}', ${t.amt})" class="bg-red-50 text-red-500 px-5 py-2 rounded-xl text-[10px] font-bold">ปฏิเสธ/คืนเงิน</button>
                            </div>
                        ` : `<span class="status-badge ${t.status==='approved'?'bg-green-100 text-green-600':'bg-red-100 text-red-500'}">${t.status}</span>`}
                    </td>
                </tr>`;
            });
            document.getElementById('transaction-table-body').innerHTML = html || '<tr><td colspan="4" class="text-center py-20 text-slate-300">ไม่มีข้อมูลธุรกรรม</td></tr>';
        }

        // ✅ 4. CORE FUNCTIONS
        function viewBankInfo(bank, accNo, name) {
            Swal.fire({
                title: 'ข้อมูลบัญชีถอนเงิน',
                html: `
                <div class="text-left space-y-3 mt-4">
                    <div class="p-4 bg-slate-50 rounded-2xl border">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">ธนาคาร / ชื่อบัญชี</p>
                        <p class="font-bold text-slate-800">${bank || '-'} / ${name || '-'}</p>
                    </div>
                    <div class="p-4 bg-blue-50 rounded-2xl border border-blue-100 flex justify-between items-center">
                        <div>
                            <p class="text-[10px] font-bold text-blue-400 uppercase">เลขบัญชี</p>
                            <p class="text-xl font-black text-blue-600 mono">${accNo || '-'}</p>
                        </div>
                        <button onclick="copyAcc('${accNo}')" class="bg-blue-600 text-white p-3 rounded-xl shadow-lg"><i class="fa-solid fa-copy"></i></button>
                    </div>
                </div>`,
                showConfirmButton: false
            });
        }

        function copyAcc(text) {
            navigator.clipboard.writeText(text);
            Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'คัดลอกเลขบัญชีแล้ว', showConfirmButton: false, timer: 1500 });
        }

        async function approveTransaction(id) {
            const res = await Swal.fire({ title: 'โอนเงินแล้วใช่หรือไม่?', text: 'การยืนยันนี้ไม่สามารถย้อนกลับได้', icon: 'question', showCancelButton: true });
            if(res.isConfirmed) await db.collection('transactions').doc(id).update({ status: 'approved' });
        }

        async function cancelWithdraw(tid, uid, amt) {
            const res = await Swal.fire({ 
                title: 'ปฏิเสธและคืนเงิน?', 
                text: `ยอดเงิน ฿${amt.toLocaleString()} จะถูกคืนเข้าบัญชีลูกค้าทันที`, 
                icon: 'warning', 
                showCancelButton: true, 
                confirmButtonColor: '#ef4444' 
            });
            if(res.isConfirmed) {
                const batch = db.batch();
                batch.update(db.collection('transactions').doc(tid), { status: 'rejected' });
                batch.update(db.collection('users').doc(uid), { balance: firebase.firestore.FieldValue.increment(amt) });
                await batch.commit();
                Swal.fire('คืนเงินสำเร็จ', 'ยกเลิกรายการและคืนเครดิตลูกค้าแล้ว', 'success');
            }
        }

        async function adjustCredit(uid, type) {
            const isAdd = type === 'add';
            const { value: amt } = await Swal.fire({ title: isAdd ? 'เพิ่มเครดิต' : 'หักเครดิต', input: 'number', inputPlaceholder: '0.00', showCancelButton: true });
            if (amt) {
                const val = isAdd ? Number(amt) : -Number(amt);
                await db.collection('users').doc(uid).update({ balance: firebase.firestore.FieldValue.increment(val) });
            }
        }

        async function editWinRate(uid, current) {
            const { value: rate } = await Swal.fire({ title: 'ปรับ Win Rate (%)', input: 'range', inputAttributes: { min: 0, max: 100 }, inputValue: current || 35 });
            if (rate) await db.collection('users').doc(uid).update({ winRate: parseInt(rate) });
        }

        function switchTab(id) {
            currentTab = id;
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('tab-'+id).classList.add('active');
            document.getElementById('btn-'+id).classList.add('active');
            if(id==='users') renderUserTable();
            if(id==='wit') renderTransactionTable();
        }

        function switchWitSubTab(tab) {
            witSubTab = tab;
            const p = document.getElementById('sub-pending-btn'), a = document.getElementById('sub-all-btn');
            if(tab === 'pending') {
                p.className = "px-8 py-3 rounded-xl text-xs font-bold transition-all bg-blue-600 text-white shadow-lg";
                a.className = "px-8 py-3 rounded-xl text-xs font-bold transition-all text-slate-500";
            } else {
                a.className = "px-8 py-3 rounded-xl text-xs font-bold transition-all bg-blue-600 text-white shadow-lg";
                p.className = "px-8 py-3 rounded-xl text-xs font-bold transition-all text-slate-500";
            }
            renderTransactionTable();
        }

        async function saveSystemSettings() {
            const url = document.getElementById('config-support-url').value;
            await db.collection('settings').doc('contact').set({ url: url });
            Swal.fire('สำเร็จ', 'บันทึกการตั้งค่าระบบแล้ว', 'success');
        }

        function logout() { auth.signOut().then(() => window.location.reload()); }
    </script>
</body>
</html>
