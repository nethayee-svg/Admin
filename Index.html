<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSP SUPREME | Flat Admin UI</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { 
            --primary: #334155; 
            --bg-main: #f1f5f9; 
            --border-color: #e2e8f0;
        }
        body { font-family: 'Prompt', sans-serif; background-color: var(--bg-main); color: #1e293b; overflow-x: hidden; }
        
        .sidebar { background: white; border-right: 1px solid var(--border-color); }
        .nav-link { 
            display: flex; align-items: center; gap: 12px; padding: 12px 20px; 
            margin: 4px 16px; border-radius: 8px; color: #64748b; 
            font-weight: 500; transition: 0.2s; cursor: pointer;
        }
        .nav-link:hover { background: #f8fafc; color: var(--primary); }
        .nav-link.active { background: var(--primary); color: white; font-weight: 600; }
        
        .flat-card { background: white; border-radius: 12px; border: 1px solid var(--border-color); }
        
        .table-container { width: 100%; border-collapse: collapse; }
        .table-row { border-bottom: 1px solid var(--border-color); transition: 0.2s; }
        .table-row:hover { background-color: #f8fafc; }
        .table-td { padding: 16px 20px; }
        .table-th { padding: 14px 20px; text-align: left; font-size: 11px; text-transform: uppercase; color: #64748b; font-weight: 700; background: #f8fafc; border-bottom: 2px solid var(--border-color); }

        .btn-flat { padding: 8px 16px; border-radius: 6px; font-size: 12px; font-weight: 600; transition: 0.2s; display: inline-flex; align-items: center; gap: 6px; cursor: pointer; border: none; }
        .btn-blue { background-color: #3b82f6; color: white; }
        .btn-green { background-color: #10b981; color: white; }
        .btn-red { background-color: #ef4444; color: white; }
        .btn-gray { background-color: #f1f5f9; color: #475569; border: 1px solid var(--border-color); }

        .tab-content { display: none; animation: fadeIn 0.3s ease-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        #login-screen { position: fixed; inset: 0; z-index: 9999; background: var(--bg-main); display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="min-h-screen lg:flex">

    <div id="login-screen">
        <div class="flat-card w-full max-w-sm p-8">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-slate-100 text-slate-600 rounded-lg flex items-center justify-center mx-auto mb-4 text-3xl"><i class="fa-solid fa-layer-group"></i></div>
                <h2 class="text-2xl font-bold text-slate-800">RSP System</h2>
                <p class="text-xs text-slate-500 mt-1">Flat Admin Panel</p>
            </div>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="อีเมล" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-slate-400">
                <input type="password" id="password" placeholder="รหัสผ่าน" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-slate-400">
                <button onclick="handleLogin()" class="w-full bg-slate-800 text-white font-bold py-3 rounded-lg hover:bg-slate-700 transition mt-2">เข้าสู่ระบบ</button>
            </div>
        </div>
    </div>

    <aside id="main-sidebar" class="sidebar fixed inset-y-0 left-0 z-50 w-64 transform -translate-x-full lg:translate-x-0 lg:static hidden flex flex-col">
        <div class="p-8 pb-4">
            <h1 class="text-xl font-bold text-slate-800 flex items-center gap-2"><i class="fa-solid fa-layer-group text-slate-400"></i> RSP <span class="font-normal text-slate-400">FLAT</span></h1>
        </div>
        <nav class="mt-4 flex-1 space-y-1">
            <div onclick="switchTab('dash')" class="nav-link active" id="btn-dash"><i class="fa-solid fa-chart-bar w-5"></i> ภาพรวมระบบ</div>
            <div onclick="switchTab('users')" class="nav-link" id="btn-users"><i class="fa-solid fa-users w-5"></i> จัดการสมาชิก</div>
            <div onclick="switchTab('wit')" class="nav-link relative" id="btn-wit">
                <i class="fa-solid fa-money-check-dollar w-5"></i> รายการธุรกรรม
                <span id="badge-wit-count" class="absolute right-4 bg-red-500 text-white text-[10px] px-2 py-0.5 rounded hidden font-bold">0</span>
            </div>
            <div onclick="switchTab('setting')" class="nav-link" id="btn-setting"><i class="fa-solid fa-gear w-5"></i> ตั้งค่าระบบ</div>
        </nav>
        <div class="p-6">
            <button onclick="logout()" class="w-full flex items-center justify-center gap-2 bg-slate-100 text-slate-600 hover:bg-red-50 hover:text-red-600 py-3 rounded-lg font-bold text-xs transition-colors"><i class="fa-solid fa-power-off"></i> ออกจากระบบ</button>
        </div>
    </aside>

    <main id="main-content" class="flex-1 overflow-y-auto h-screen p-6 lg:p-10 hidden">
        <header class="flex justify-between items-center mb-8">
            <h2 id="page-title" class="text-2xl font-bold text-slate-800">ภาพรวมระบบ</h2>
            <div id="display-date" class="text-xs font-bold text-slate-500 bg-white border px-4 py-2 rounded-lg">--/--/----</div>
        </header>

        <div class="max-w-7xl mx-auto space-y-6">

            <section id="tab-dash" class="tab-content active">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                    <div class="flat-card p-6 border-l-4 border-l-blue-500">
                        <p class="text-slate-500 text-xs font-bold mb-2">สมาชิกทั้งหมด</p>
                        <h3 class="text-3xl font-bold" id="stat-total-users">0</h3>
                    </div>
                    <div class="flat-card p-6 border-l-4 border-l-green-500">
                        <p class="text-slate-500 text-xs font-bold mb-2">เครดิตรวมในระบบ</p>
                        <h3 class="text-3xl font-bold">฿<span id="stat-total-bal">0.00</span></h3>
                    </div>
                    <div class="flat-card p-6 border-l-4 border-l-red-500 bg-red-50">
                        <p class="text-red-600 text-xs font-bold mb-2">รออนุมัติถอน</p>
                        <h3 class="text-3xl font-bold text-red-600" id="stat-pending-wit">0</h3>
                    </div>
                </div>
            </section>

            <section id="tab-users" class="tab-content">
                <div class="flat-card p-4 mb-6">
                    <input type="text" id="user-search-input" oninput="renderUserTable()" placeholder="ค้นหาชื่อลูกค้า..." class="w-full md:w-96 p-3 rounded-lg bg-slate-50 border border-slate-200 text-sm focus:outline-none focus:border-slate-400">
                </div>
                <div class="flat-card overflow-hidden">
                    <table class="table-container">
                        <thead>
                            <tr>
                                <th class="table-th">ลูกค้า</th>
                                <th class="table-th">เครดิต</th>
                                <th class="table-th">Win Rate</th>
                                <th class="table-th text-center">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="user-table-body"></tbody>
                    </table>
                </div>
            </section>

            <section id="tab-wit" class="tab-content">
                <div class="flex gap-2 mb-6">
                    <button onclick="switchWitSubTab('pending')" id="sub-pending-btn" class="px-6 py-2.5 rounded-lg text-sm font-bold bg-slate-800 text-white">รออนุมัติ</button>
                    <button onclick="switchWitSubTab('all')" id="sub-all-btn" class="px-6 py-2.5 rounded-lg text-sm font-bold bg-white text-slate-500 border hover:bg-slate-50">ทั้งหมด</button>
                </div>
                <div class="flat-card overflow-hidden">
                    <table class="table-container">
                        <thead>
                            <tr>
                                <th class="table-th">ชื่อลูกค้า</th>
                                <th class="table-th">ยอดถอน</th>
                                <th class="table-th text-center">ข้อมูลบัญชี</th>
                                <th class="table-th text-center">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="transaction-table-body"></tbody>
                    </table>
                </div>
            </section>

            <section id="tab-setting" class="tab-content">
                <div class="max-w-xl flat-card p-6 border-t-4 border-t-slate-800">
                    <h4 class="font-bold text-slate-800 mb-4">ลิงก์ติดต่อซัพพอร์ต</h4>
                    <input type="text" id="config-support-url" placeholder="URL ติดต่อซัพพอร์ต" class="w-full p-3 rounded-lg bg-slate-50 border border-slate-200 mb-4 text-sm focus:outline-none">
                    <button onclick="saveSystemSettings()" class="btn-flat bg-slate-800 text-white w-full justify-center py-3">บันทึกข้อมูล</button>
                </div>
            </section>

        </div>
    </main>

    <script>
        // --- 1. SETUP FIREBASE ---
        const firebaseConfig = { apiKey: "AIzaSyDaeVJ1mUxjm1gG4GMTfZyqJsjImiISzPI", projectId: "gaga-1eb83" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(), auth = firebase.auth();

        let users = [], transactions = [], currentTab = 'dash', witSubTab = 'pending';
        document.getElementById('display-date').innerText = new Date().toLocaleDateString('th-TH');

        // --- 2. AUTHENTICATION (แก้ไขให้เข้าได้ชัวร์ 100%) ---
        auth.onAuthStateChanged(user => {
            if (user) {
                // **เอาเงื่อนไขการเช็ค role admin ออกแล้ว** แค่รหัสผ่านถูกก็เข้าได้เลยเหมือนตอนแรก
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-sidebar').classList.remove('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                initRealtimeData(); 
            } else { 
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-sidebar').classList.add('hidden');
                document.getElementById('main-content').classList.add('hidden');
            }
        });

        async function handleLogin() {
            const e = document.getElementById('email').value, p = document.getElementById('password').value;
            if (!e || !p) return Swal.fire('เตือน', 'กรุณากรอกอีเมลและรหัสผ่าน', 'warning');
            try { 
                await auth.signInWithEmailAndPassword(e, p); 
            } catch (err) { 
                Swal.fire('ล้มเหลว', 'อีเมลหรือรหัสผ่านไม่ถูกต้อง', 'error'); 
            }
        }

        // --- 3. DATA LOAD ---
        function initRealtimeData() {
            db.collection('users').onSnapshot(snap => {
                users = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                updateStats(); if(currentTab === 'users') renderUserTable();
            });
            db.collection('transactions').onSnapshot(snap => {
                transactions = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.time || 0) - (a.time || 0));
                updateStats(); if(currentTab === 'wit') renderTransactionTable(); 
            });
            db.collection('settings').doc('contact').get().then(doc => { 
                if(doc.exists) document.getElementById('config-support-url').value = doc.data().url || ''; 
            });
        }

        function updateStats() {
            document.getElementById('stat-total-users').innerText = users.length;
            document.getElementById('stat-total-bal').innerText = users.reduce((s, u) => s + (u.balance || 0), 0).toLocaleString();
            const p = transactions.filter(t => t.status === 'pending').length;
            document.getElementById('stat-pending-wit').innerText = p;
            const badge = document.getElementById('badge-wit-count');
            if(p > 0) { badge.innerText = p; badge.classList.remove('hidden'); } else badge.classList.add('hidden');
        }

        // --- 4. RENDERERS ---
        function renderUserTable() {
            const search = document.getElementById('user-search-input').value.toLowerCase();
            const filtered = users.filter(u => (u.name||'').toLowerCase().includes(search));
            let html = '';
            filtered.forEach(u => {
                html += `
                <tr class="table-row">
                    <td class="table-td font-bold">${u.name || 'ไม่ระบุชื่อ'}<br><span class="text-xs text-slate-400 font-normal">${u.email||'-'}</span></td>
                    <td class="table-td font-bold text-lg">฿${(u.balance||0).toLocaleString()}</td>
                    <td class="table-td"><button onclick="editWinRate('${u.id}', ${u.winRate})" class="btn-flat btn-gray">${u.winRate || 35}%</button></td>
                    <td class="table-td text-center">
                        <button onclick="quickAdjust('${u.id}', '${u.name}', 'add')" class="btn-flat btn-green"><i class="fa-solid fa-plus"></i></button>
                        <button onclick="quickAdjust('${u.id}', '${u.name}', 'minus')" class="btn-flat btn-red"><i class="fa-solid fa-minus"></i></button>
                    </td>
                </tr>`;
            });
            document.getElementById('user-table-body').innerHTML = html;
        }

        function renderTransactionTable() {
            let f = witSubTab === 'pending' ? transactions.filter(t => t.status === 'pending') : transactions;
            let html = '';
            f.forEach(t => {
                const info = (t.details || "").split(" | "); // [Bank, AccNo, AccName]
                html += `
                <tr class="table-row">
                    <td class="table-td font-bold">${t.name}<br><span class="text-[10px] text-slate-400 font-normal">${t.date||'-'}</span></td>
                    <td class="table-td font-bold text-lg text-slate-800">฿${(t.amt||0).toLocaleString()}</td>
                    <td class="table-td text-center">
                        <button onclick="viewWithdrawDetails('${info[0]}', '${info[1]}', '${info[2]}')" class="btn-flat btn-blue"><i class="fa-solid fa-eye"></i> ดูข้อมูล</button>
                    </td>
                    <td class="table-td text-center">
                        ${t.status === 'pending' ? `
                            <button onclick="approveTransaction('${t.id}')" class="btn-flat btn-green">อนุมัติ</button>
                            <button onclick="rejectTransaction('${t.id}', '${t.uid}', ${t.amt})" class="btn-flat btn-red">ยกเลิก</button>
                        ` : `<span class="text-xs font-bold px-3 py-1 rounded bg-slate-100 ${t.status==='approved'?'text-green-600':'text-red-600'}">${t.status==='approved'?'อนุมัติแล้ว':'ยกเลิกแล้ว'}</span>`}
                    </td>
                </tr>`;
            });
            document.getElementById('transaction-table-body').innerHTML = html || '<tr><td colspan="4" class="text-center py-10 text-slate-400">ไม่มีรายการธุรกรรม</td></tr>';
        }

        // --- 5. ACTIONS & MODALS ---
        // ดูข้อมูลและคัดลอกเลขบัญชี
        function viewWithdrawDetails(bank, accNo, accName) {
            Swal.fire({
                title: 'ข้อมูลถอนเงิน',
                html: `
                    <div class="text-left mt-4 space-y-3">
                        <div class="bg-slate-50 p-4 rounded-lg border border-slate-200">
                            <span class="text-xs text-slate-500 block font-bold">ธนาคาร</span>
                            <strong class="text-slate-800">${bank || '-'}</strong>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-lg border border-slate-200">
                            <span class="text-xs text-slate-500 block font-bold">ชื่อบัญชี</span>
                            <strong class="text-slate-800">${accName || '-'}</strong>
                        </div>
                        <div class="bg-blue-50 p-4 rounded-lg border border-blue-200 flex justify-between items-center">
                            <div>
                                <span class="text-xs text-blue-500 block font-bold">เลขบัญชี</span>
                                <strong class="text-blue-900 text-lg">${accNo || '-'}</strong>
                            </div>
                            <button onclick="navigator.clipboard.writeText('${accNo}'); Swal.fire({toast:true, position:'top-end', icon:'success', title:'คัดลอกแล้ว', showConfirmButton:false, timer:1500})" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-xs font-bold transition">คัดลอก</button>
                        </div>
                    </div>
                `,
                showConfirmButton: false, showCloseButton: true
            });
        }

        async function quickAdjust(uid, name, type) {
            const isAdd = type === 'add';
            const { value: amt } = await Swal.fire({ title: isAdd?'เพิ่มเครดิต':'หักเครดิต', input: 'number', showCancelButton: true });
            if (amt && Number(amt) > 0) {
                const fAmt = isAdd ? Number(amt) : -Number(amt);
                await db.collection('users').doc(uid).update({ balance: firebase.firestore.FieldValue.increment(fAmt) });
                Swal.fire({ icon: 'success', title: 'สำเร็จ', timer: 1500, showConfirmButton: false });
            }
        }

        async function editWinRate(uid, cur) {
            const { value: r } = await Swal.fire({ title: 'ปรับ Win Rate (%)', input: 'range', inputAttributes: { min: 0, max: 100 }, inputValue: cur||35 });
            if(r) await db.collection('users').doc(uid).update({ winRate: parseInt(r) });
        }

        async function approveTransaction(tid) {
            const res = await Swal.fire({ title: 'ยืนยันอนุมัติ?', icon: 'question', showCancelButton: true });
            if(res.isConfirmed) await db.collection('transactions').doc(tid).update({ status: 'approved' });
        }

        // ฟังก์ชันยกเลิกถอนและคืนเงิน
        async function rejectTransaction(tid, uid, amt) {
            const res = await Swal.fire({ 
                title: 'ยกเลิกการถอนเงิน?', 
                text: `ระบบจะทำการคืนเงิน ฿${amt.toLocaleString()} กลับเข้าเครดิตลูกค้า`, 
                icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444' 
            });
            if(res.isConfirmed) {
                await db.collection('transactions').doc(tid).update({ status: 'rejected' });
                await db.collection('users').doc(uid).update({ balance: firebase.firestore.FieldValue.increment(amt) });
                Swal.fire({ icon: 'success', title: 'คืนเงินสำเร็จ!', timer: 1500, showConfirmButton: false });
            }
        }

        async function saveSystemSettings() {
            const url = document.getElementById('config-support-url').value;
            await db.collection('settings').doc('contact').set({ url: url });
            Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ', timer: 1000, showConfirmButton: false });
        }

        // --- 6. NAV ---
        function switchTab(id) {
            currentTab = id;
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('tab-'+id).classList.add('active');
            document.getElementById('btn-'+id).classList.add('active');
            
            const titles = { dash: 'ภาพรวมระบบ', users: 'จัดการสมาชิก', wit: 'รายการธุรกรรม', setting: 'ตั้งค่าระบบ' };
            document.getElementById('page-title').innerText = titles[id];
            if(id === 'users') renderUserTable();
            if(id === 'wit') renderTransactionTable();
        }

        function switchWitSubTab(tab) {
            witSubTab = tab;
            const bp = document.getElementById('sub-pending-btn'), ba = document.getElementById('sub-all-btn');
            if(tab === 'pending') { bp.className="px-6 py-2.5 rounded-lg text-sm font-bold bg-slate-800 text-white"; ba.className="px-6 py-2.5 rounded-lg text-sm font-bold bg-white text-slate-500 border hover:bg-slate-50"; }
            else { ba.className="px-6 py-2.5 rounded-lg text-sm font-bold bg-slate-800 text-white"; bp.className="px-6 py-2.5 rounded-lg text-sm font-bold bg-white text-slate-500 border hover:bg-slate-50"; }
            renderTransactionTable();
        }

        function logout() { auth.signOut().then(() => window.location.reload()); }
    </script>
</body>
</html>
